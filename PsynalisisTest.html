<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Ψ Psynalisis Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --border: #d8dee6;
    --text: #1f2937;
    --muted: #6b7280;
    --shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    --radius: 16px;
    --radius-sm: 12px;
    --accent: #374151;
    --accent-hover: #1f2937;
    --success: #2f6f4f;
    --danger: #b91c1c;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 18px;
  }

  .app-card {
    width: 100%;
    max-width: 760px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 28px 22px 26px;
  }

  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 10px;
  }

  #timerBox {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 100px;
    text-align: center;
  }

  h1 {
    margin: 8px 0 10px;
    font-size: clamp(1.55rem, 3vw, 2rem);
    font-weight: 700;
    text-align: center;
    color: var(--text);
  }

  .subtitle {
    margin: 0 0 24px;
    text-align: center;
    color: var(--muted);
    font-size: 1rem;
  }

  .status-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 26px;
  }

  .status-card {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }

  .status-label {
    font-size: 0.92rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .status-value {
    font-size: 1.45rem;
    font-weight: 700;
    color: var(--text);
  }

  #decks {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .deckBtn {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 16px;
    min-height: 92px;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--accent);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    box-shadow: 0 4px 10px rgba(15, 23, 42, 0.04);
  }

  .deckBtn:hover {
    transform: translateY(-1px);
    border-color: #bfc8d3;
    box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
  }

  .deckBtn:active {
    transform: translateY(0);
  }

  .deckBtn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  #completionBox {
    display: none;
    margin-top: 24px;
    padding: 18px 16px;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: #f9fafb;
    text-align: center;
    line-height: 1.7;
  }

  #completionBox a {
  display: inline-block;
  margin-top: 10px;
  padding: 12px 18px;
  border-radius: 12px;
  background: var(--success);
  color: #fff;
  font-weight: 700;
  text-decoration: none;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

#completionBox a:hover {
  opacity: 0.95;
  transform: translateY(-1px);
}

  #terminateBtn {
    position: fixed;
    bottom: 18px;
    right: 18px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: var(--danger);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1500;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  #terminateBtn:hover {
    transform: scale(1.06);
  }

  #modalOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.35);
    z-index: 1999;
  }

  #resultCard {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: min(88vw, 380px);
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
    padding: 24px 20px 18px;
    z-index: 2000;
    text-align: center;
  }

  #resultText {
    font-size: 1.08rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }

  #collectBtn {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 14px 16px;
    background: var(--success);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s ease, transform 0.15s ease;
  }

  #collectBtn:hover {
    opacity: 0.95;
    transform: translateY(-1px);
  }

  body.modal-open {
    overflow: hidden;
  }

  @media (max-width: 640px) {
    .app-card {
      padding: 20px 16px 22px;
      border-radius: 18px;
    }

    .status-grid,
    #decks {
      grid-template-columns: 1fr;
    }

    .deckBtn {
      min-height: 82px;
      font-size: 1.08rem;
    }

    #terminateBtn {
      width: 36px;
      height: 36px;
      font-size: 15px;
    }
  }
</style>
</head>

<body>
  <div class="page">
    <div class="app-card">
      <div class="topbar">
        <div id="timerBox">Time: --:--</div>
      </div>

      <h1>Ψ Psynalisis Test</h1>
      <p class="subtitle">Select a deck: A, B, C, or D</p>

      <div class="status-grid">
        <div class="status-card">
          <div class="status-label">Score</div>
          <div class="status-value" id="scoreBox">2000</div>
        </div>

        <div class="status-card">
          <div class="status-label">Trial</div>
          <div class="status-value" id="trialBox">0 / 60</div>
        </div>
      </div>

      <div id="decks">
        <button class="deckBtn" onclick="chooseDeck('A')">Deck A</button>
        <button class="deckBtn" onclick="chooseDeck('B')">Deck B</button>
        <button class="deckBtn" onclick="chooseDeck('C')">Deck C</button>
        <button class="deckBtn" onclick="chooseDeck('D')">Deck D</button>
      </div>

      <div id="completionBox"></div>
    </div>
  </div>

  <div id="modalOverlay"></div>

  <div id="resultCard">
    <div id="resultText"></div>
    <button id="collectBtn" onclick="collectPoints()">Collect Points</button>
  </div>

  <button id="terminateBtn" onclick="terminateTask()">T</button>

<script>
  // Google Sheet Web App URL
  const googleSheetURL = "https://script.google.com/macros/s/AKfycbxaPNgnulrQe_sUornR3WZSF1YBfX_0FPWA0k04n-jyzTdvIdWMbUhELokCjjhIPMCr/exec";

  // Participant ID
  let participantID = prompt("Enter participant ID (e.g., P01):");
  if (!participantID) participantID = "Unknown";

  // Timer
  let timerMinutes = prompt("Enter time limit in minutes:");
  timerMinutes = parseInt(timerMinutes, 10);

  if (isNaN(timerMinutes) || timerMinutes <= 0) {
    timerMinutes = 3;
  }

  let totalSeconds = timerMinutes * 60;
  let timerInterval = null;
  let timerStarted = false;
  let taskEnded = false;

  // Experiment parameters
  let nTrials = 60;
  let trial = 0;
  let results = [];
  let totalScore = 2000;
  let awaitingCollect = false;
  let pendingResult = null;
  let backupCSVUrl = null;

  // Outcomes
  let AB_outcomes = [];
  let CD_outcomes = [];

  for (let i = 0; i < nTrials; i++) {
    AB_outcomes.push(Math.random() < 0.5 ? 0 : 1);
    CD_outcomes.push(i % 2 === 0 ? 0 : 50);
  }

  // UI
  function updateScoreDisplay() {
    document.getElementById("scoreBox").textContent = totalScore;
  }

  function updateTrialDisplay() {
    document.getElementById("trialBox").textContent = `${trial} / ${nTrials}`;
  }

  function setDeckButtonsEnabled(enabled) {
    document.querySelectorAll(".deckBtn").forEach(btn => btn.disabled = !enabled);
  }

  function updateTimerDisplay() {
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    document.getElementById("timerBox").textContent =
      "Time: " +
      String(minutes).padStart(2, "0") +
      ":" +
      String(seconds).padStart(2, "0");
  }

  function showResultModal() {
    document.getElementById("modalOverlay").style.display = "block";
    document.getElementById("resultCard").style.display = "block";
    document.body.classList.add("modal-open");
  }

  function hideResultModal() {
    document.getElementById("modalOverlay").style.display = "none";
    document.getElementById("resultCard").style.display = "none";
    document.body.classList.remove("modal-open");
  }

 function showCompletionMessage(fileName, fileURL) {
  const completionBox = document.getElementById("completionBox");

  completionBox.style.display = "block";

  completionBox.innerHTML = `
    <strong>Thank you for participating!</strong><br>
    The results file should download automatically.<br>
    If it did not download, use the button below.<br><br>

    <a href="${fileURL}" download="${fileName}">
      Download Backup File
    </a>
  `;
}

  // Timer
  function startTimer() {
    function updateTimer() {
      if (taskEnded) return;

      updateTimerDisplay();

      if (totalSeconds <= 0) {
        clearInterval(timerInterval);
        endTask();
        return;
      }

      totalSeconds--;
    }

    updateTimer();
    timerInterval = setInterval(updateTimer, 1000);
  }

  // Create CSV blob and file info
  function createCSVFile(results) {
    const keys = results.length > 0
      ? Object.keys(results[0])
      : ["trial", "choice", "gain", "loss", "net", "totalScore"];

    const csvRows = [keys.join(",")];

    results.forEach(row => {
      csvRows.push(keys.map(k => row[k]).join(","));
    });

    const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const now = new Date();
    const timestamp =
      now.getFullYear() +
      String(now.getMonth() + 1).padStart(2, "0") +
      String(now.getDate()).padStart(2, "0") + "_" +
      String(now.getHours()).padStart(2, "0") +
      String(now.getMinutes()).padStart(2, "0") +
      String(now.getSeconds()).padStart(2, "0");

    const filename = `PsynalisisTest_${participantID}_${timestamp}.csv`;

    return { url, filename };
  }

  // Automatic CSV download
  function triggerCSVDownload(fileURL, fileName) {
    const a = document.createElement("a");
    a.hidden = true;
    a.href = fileURL;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // Choose deck
  function chooseDeck(deck) {
    if (!timerStarted) {
      startTimer();
      timerStarted = true;
    }

    if (trial >= nTrials || awaitingCollect || taskEnded) return;

    let gain = 0, loss = 0, net = 0;

    if (deck === "A" || deck === "B") {
      if (AB_outcomes[trial] === 0) {
        gain = 100;
        loss = 0;
      } else {
        gain = 100;
        loss = 250;
      }
    } else {
      gain = 50;
      loss = CD_outcomes[trial];
    }

    net = gain - loss;

    pendingResult = {
      trial: trial + 1,
      choice: deck,
      gain,
      loss,
      net
    };

    awaitingCollect = true;
    setDeckButtonsEnabled(false);

    document.getElementById("resultText").innerHTML = `
      <strong>Deck ${deck}</strong><br>
      Gain: $${gain}<br>
      Loss: $${loss}<br>
      Net: $${net}
    `;

    showResultModal();
  }

  // Collect points
  function collectPoints() {
    if (!pendingResult || taskEnded) return;

    totalScore += pendingResult.net;

    results.push({
      trial: pendingResult.trial,
      choice: pendingResult.choice,
      gain: pendingResult.gain,
      loss: pendingResult.loss,
      net: pendingResult.net,
      totalScore: totalScore
    });

    trial++;

    updateScoreDisplay();
    updateTrialDisplay();

    pendingResult = null;
    awaitingCollect = false;

    hideResultModal();

    if (trial >= nTrials) {
      endTask();
    } else {
      setDeckButtonsEnabled(true);
    }
  }

  // PASSWORD TERMINATE
  function terminateTask() {
    const password = prompt("Enter researcher password to terminate:");

    if (password === "2022315101") {
      endTask();
    } else if (password === null) {
      return;
    } else {
      alert("Incorrect password.");
    }
  }

  function endTask() {
    if (taskEnded) return;

    taskEnded = true;

    setDeckButtonsEnabled(false);
    hideResultModal();

    if (timerInterval) clearInterval(timerInterval);

    fetch(googleSheetURL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ participantID, trials: results })
    }).catch(err => console.error(err));

    if (backupCSVUrl) {
      window.URL.revokeObjectURL(backupCSVUrl);
      backupCSVUrl = null;
    }

    const csvFile = createCSVFile(results);
    backupCSVUrl = csvFile.url;

    triggerCSVDownload(csvFile.url, csvFile.filename);
    showCompletionMessage(csvFile.filename, csvFile.url);

    trial = nTrials;
    updateTrialDisplay();
    updateTimerDisplay();
  }

  window.addEventListener("beforeunload", () => {
    if (backupCSVUrl) {
      window.URL.revokeObjectURL(backupCSVUrl);
    }
  });

  updateScoreDisplay();
  updateTrialDisplay();
  updateTimerDisplay();
</script>
</body>
</html>
