<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ψ Psynalisis Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 20px;
  background: #f8f8f8;
  overflow-x: hidden;
}

h1 {
  font-size: 1.8em;
  margin-bottom: 10px;
}

p {
  font-size: 1.1em;
}

#scoreBox {
  font-size: 1.5em;
  font-weight: bold;
  background: #fff;
  border: 2px solid #333;
  border-radius: 12px;
  padding: 12px;
  margin: 15px auto;
  width: fit-content;
  min-width: 180px;
}

#trialBox {
  font-size: 1.1em;
  margin-bottom: 15px;
}

#decks {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  font-size: 1.3em;
  padding: 20px;
  margin: 10px;
  width: 45%;
  max-width: 200px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

#timerBox {
  position: fixed;
  top: 12px;
  right: 16px;
  background: white;
  border: 2px solid #333;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  font-weight: bold;
  z-index: 1000;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* Floating researcher terminate button */

#terminateBtn {

  position: fixed;
  bottom: 18px;
  right: 18px;

  width: 44px;
  height: 44px;

  border-radius: 50%;
  border: none;

  background: red;
  color: white;

  font-size: 20px;
  font-weight: bold;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;

  z-index: 1500;

  box-shadow: 0 4px 10px rgba(0,0,0,0.25);
}

#terminateBtn:hover{
  transform: scale(1.1);
}

/* Modal overlay */

#modalOverlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1999;
}

#resultCard {
  display: none;

  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  background: #fff;
  border: 2px solid #333;
  border-radius: 16px;

  padding: 22px;

  width: min(85vw, 360px);

  box-shadow: 0 6px 18px rgba(0,0,0,0.25);

  z-index: 2000;
}

#resultText {
  font-size: 1.2em;
  margin-bottom: 15px;
  line-height: 1.5;
}

#collectBtn {
  background-color: #28a745;
  color: white;
  width: 100%;
}

body.modal-open {
  overflow: hidden;
}

</style>
</head>

<body>

<div id="timerBox">Time: --:--</div>

<h1>Ψ Psynalisis Test</h1>
<p>Select a deck: A, B, C, or D</p>

<div id="scoreBox">Score: 2000</div>
<div id="trialBox">Trial: 0 / 60</div>

<div id="decks">
  <button class="deckBtn" onclick="chooseDeck('A')">Deck A</button>
  <button class="deckBtn" onclick="chooseDeck('B')">Deck B</button>
  <button class="deckBtn" onclick="chooseDeck('C')">Deck C</button>
  <button class="deckBtn" onclick="chooseDeck('D')">Deck D</button>
</div>

<div id="modalOverlay"></div>

<div id="resultCard">
  <div id="resultText"></div>
  <button id="collectBtn" onclick="collectPoints()">Collect Points</button>
</div>

<!-- Floating researcher button -->
<button id="terminateBtn" onclick="terminateTask()">T</button>

<script>

// Google Sheet Web App URL
const googleSheetURL = "https://script.google.com/macros/s/AKfycbxaPNgnulrQe_sUornR3WZSF1YBfX_0FPWA0k04n-jyzTdvIdWMbUhELokCjjhIPMCr/exec";

// Participant ID
let participantID = prompt("Enter participant ID (e.g., P01):");
if (!participantID) participantID = "Unknown";

// Timer
let timerMinutes = prompt("Enter time limit in minutes:");
timerMinutes = parseInt(timerMinutes, 10);

if (isNaN(timerMinutes) || timerMinutes <= 0) {
  timerMinutes = 3;
}

let totalSeconds = timerMinutes * 60;
let timerInterval = null;
let timerStarted = false;
let taskEnded = false;

// Experiment parameters
let nTrials = 60;
let trial = 0;
let results = [];
let totalScore = 2000;
let awaitingCollect = false;
let pendingResult = null;

// Outcomes
let AB_outcomes = [];
let CD_outcomes = [];

for (let i = 0; i < nTrials; i++) {
  AB_outcomes.push(Math.random() < 0.5 ? 0 : 1);
  CD_outcomes.push(i % 2 === 0 ? 0 : 50);
}

// UI
function updateScoreDisplay() {
  document.getElementById("scoreBox").textContent = `Score: ${totalScore}`;
}

function updateTrialDisplay() {
  document.getElementById("trialBox").textContent = `Trial: ${trial} / ${nTrials}`;
}

function setDeckButtonsEnabled(enabled) {
  document.querySelectorAll(".deckBtn").forEach(btn => btn.disabled = !enabled);
}

function updateTimerDisplay() {

  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;

  document.getElementById("timerBox").textContent =
    "Time: " +
    String(minutes).padStart(2, "0") +
    ":" +
    String(seconds).padStart(2, "0");
}

function showResultModal() {
  document.getElementById("modalOverlay").style.display = "block";
  document.getElementById("resultCard").style.display = "block";
}

function hideResultModal() {
  document.getElementById("modalOverlay").style.display = "none";
  document.getElementById("resultCard").style.display = "none";
}

// Timer
function startTimer() {

  function updateTimer() {

    if (taskEnded) return;

    updateTimerDisplay();

    if (totalSeconds <= 0) {
      clearInterval(timerInterval);
      endTask();
      return;
    }

    totalSeconds--;
  }

  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
}

// CSV Download
function downloadCSV(results) {

  if (results.length === 0) return;

  const keys = Object.keys(results[0]);
  const csvRows = [keys.join(",")];

  results.forEach(row => {
    csvRows.push(keys.map(k => row[k]).join(","));
  });

  const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement("a");

  const now = new Date();

  const timestamp =
    now.getFullYear() +
    String(now.getMonth() + 1).padStart(2, "0") +
    String(now.getDate()).padStart(2, "0") + "_" +
    String(now.getHours()).padStart(2, "0") +
    String(now.getMinutes()).padStart(2, "0") +
    String(now.getSeconds()).padStart(2, "0");

  a.hidden = true;
  a.href = url;
  a.download = `PsynalisisTest_${participantID}_${timestamp}.csv`;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Choose deck
function chooseDeck(deck) {

  if (!timerStarted) {
    startTimer();
    timerStarted = true;
  }

  if (trial >= nTrials || awaitingCollect || taskEnded) return;

  let gain = 0, loss = 0, net = 0;

  if (deck === "A" || deck === "B") {

    if (AB_outcomes[trial] === 0) {
      gain = 100;
      loss = 0;
    } else {
      gain = 100;
      loss = 250;
    }

  } else {

    gain = 50;
    loss = CD_outcomes[trial];
  }

  net = gain - loss;

  pendingResult = {
    trial: trial + 1,
    choice: deck,
    gain,
    loss,
    net
  };

  awaitingCollect = true;

  setDeckButtonsEnabled(false);

  document.getElementById("resultText").innerHTML = `
    <b>Deck ${deck}</b><br>
    Gain: $${gain}<br>
    Loss: $${loss}<br>
    Net: $${net}
  `;

  showResultModal();
}

// Collect points
function collectPoints() {

  if (!pendingResult || taskEnded) return;

  totalScore += pendingResult.net;

  results.push({
    trial: pendingResult.trial,
    choice: pendingResult.choice,
    gain: pendingResult.gain,
    loss: pendingResult.loss,
    net: pendingResult.net,
    totalScore: totalScore
  });

  trial++;

  updateScoreDisplay();
  updateTrialDisplay();

  pendingResult = null;
  awaitingCollect = false;

  hideResultModal();

  if (trial >= nTrials) {
    endTask();
  } else {
    setDeckButtonsEnabled(true);
  }
}

// PASSWORD TERMINATE
function terminateTask() {

  const password = prompt("Enter researcher password to terminate:");

  if (password === "2022315101") {
    endTask();
  } else if (password === null) {
    return;
  } else {
    alert("Incorrect password.");
  }

}

function endTask() {

  if (taskEnded) return;

  taskEnded = true;

  setDeckButtonsEnabled(false);
  hideResultModal();

  if (timerInterval) clearInterval(timerInterval);

  fetch(googleSheetURL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ participantID, trials: results })
  }).catch(err => console.error(err));

  downloadCSV(results);

  trial = nTrials;

  updateTrialDisplay();
  updateTimerDisplay();
}

updateScoreDisplay();
updateTrialDisplay();
updateTimerDisplay();

</script>

</body>
</html>
